# Netlify Configuration for punzenverzeichnis

[build]
  command = "bun install && bun run build"
  functions = "supabase/functions"
  publish = "dist"

[build.environment]
  NODE_ENV = "production"
  NODE_VERSION = "20.x"

# Redirects for SPA (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and caching
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/dist/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Environment variables needed in production
# Set these in Netlify UI under Site settings > Build & deploy > Environment
# Required variables:
# - VITE_SUPABASE_PROJECT_ID
# - VITE_SUPABASE_PUBLISHABLE_KEY
# - VITE_SUPABASE_URL
# - SUPABASE_URL (for functions)
# - SUPABASE_ANON_KEY (for functions)
# - SUPABASE_SERVICE_ROLE_KEY (for functions)

[context.production]
  command = "bun install && bun run build"
  
[context.deploy-preview]
  command = "bun install && bun run build:dev"

[context.branch-deploy]
  command = "bun install && bun run build:dev"
